<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 393 852" width="393" height="852" font-family="Inter, system-ui, sans-serif">
  <defs><clipPath id="phone"><rect x="0" y="0" width="393" height="852" rx="56"/></clipPath></defs>
  <g clip-path="url(#phone)">
    <rect width="393" height="852" fill="#fffdf7"/>

    <!-- Status bar -->
    <text x="32" y="30" font-size="15" font-weight="600" fill="#14110c">9:41</text>
    <rect x="135" y="11" width="123" height="35" rx="20" fill="#14110c"/>

    <!-- Header -->
    <g transform="translate(24,72)">
      <text font-size="11" letter-spacing="1.6" fill="#e68a17">CAMPAIGNS</text>
      <text font-size="28" font-weight="700" fill="#14110c" y="36">Tell the</text>
      <text font-size="28" font-weight="700" font-style="italic" fill="#0d4a2e" y="68">neighbourhood.</text>
      <text font-size="12" fill="#3a3530" y="92">Each campaign goes through a quick admin review.</text>
    </g>

    <!-- New campaign button -->
    <g transform="translate(24,200)">
      <rect width="345" height="48" rx="14" fill="#0d4a2e"/>
      <text x="172.5" y="30" text-anchor="middle" font-size="13.5" font-weight="600" fill="#f7efe1">+  New campaign</text>
    </g>

    <!-- Live campaign -->
    <g transform="translate(24,272)">
      <rect width="345" height="146" rx="18" fill="#fffdf7" stroke="#14110c" stroke-opacity="0.08"/>
      <text x="20" y="28" font-size="10.5" letter-spacing="1.4" fill="#e68a17">FESTIVAL</text>
      <g transform="translate(280,12)">
        <rect width="50" height="22" rx="11" fill="#0d4a2e" opacity="0.14"/>
        <text x="25" y="15" text-anchor="middle" font-size="10" font-weight="700" fill="#06311c">LIVE</text>
      </g>
      <text x="20" y="54" font-size="17" font-weight="700" fill="#14110c">Mithai trays for Diwali</text>
      <text x="20" y="76" font-size="11.5" fill="#3a3530">Pre-book 1kg sweet boxes — Kaju Katli + Gulab Jamun.</text>
      <text x="20" y="106" font-size="11" fill="#3a3530">Apr 24 09:00 → May 02 22:00 · 25% off · 4 items linked</text>
      <g transform="translate(20,118)">
        <rect width="60" height="22" rx="11" fill="#fffdf7" stroke="#14110c" stroke-opacity="0.18"/>
        <text x="30" y="15" text-anchor="middle" font-size="11" fill="#14110c">Edit</text>
      </g>
      <g transform="translate(86,118)">
        <rect width="76" height="22" rx="11" fill="#fffdf7" stroke="#c64f2e" stroke-opacity="0.4"/>
        <text x="38" y="15" text-anchor="middle" font-size="11" fill="#c64f2e">Remove</text>
      </g>
    </g>

    <!-- Awaiting review -->
    <g transform="translate(24,442)">
      <rect width="345" height="146" rx="18" fill="#fffdf7" stroke="#e68a17" stroke-width="1.4"/>
      <text x="20" y="28" font-size="10.5" letter-spacing="1.4" fill="#e68a17">EARLY BIRD</text>
      <g transform="translate(238,12)">
        <rect width="92" height="22" rx="11" fill="#e68a17" opacity="0.18"/>
        <text x="46" y="15" text-anchor="middle" font-size="10" font-weight="700" fill="#962f15">AWAITING REVIEW</text>
      </g>
      <text x="20" y="54" font-size="17" font-weight="700" fill="#14110c">Hot Jalebi at ₹100 till 9 AM</text>
      <text x="20" y="76" font-size="11.5" fill="#3a3530">Pre-breakfast morning special · weekday only.</text>
      <text x="20" y="106" font-size="11" fill="#3a3530">Apr 28 06:00 → ongoing · 18% off · 1 item</text>
      <g transform="translate(20,118)">
        <rect width="120" height="22" rx="11" fill="#0d4a2e" opacity="0.06"/>
        <text x="14" y="15" font-size="10.5" fill="#06311c">Reviews clear in ~1h</text>
      </g>
    </g>

    <!-- Removal pending -->
    <g transform="translate(24,612)">
      <rect width="345" height="124" rx="18" fill="#fffdf7" stroke="#14110c" stroke-opacity="0.08"/>
      <text x="20" y="28" font-size="10.5" letter-spacing="1.4" fill="#3a3530">FLASH SALE</text>
      <g transform="translate(248,12)">
        <rect width="82" height="22" rx="11" fill="#e68a17" opacity="0.18"/>
        <text x="41" y="15" text-anchor="middle" font-size="10" font-weight="700" fill="#962f15">REMOVAL PENDING</text>
      </g>
      <text x="20" y="54" font-size="16" font-weight="700" fill="#14110c">Kachori weekend bonanza</text>
      <text x="20" y="76" font-size="11.5" fill="#3a3530">Removal awaiting Magarpatta Go review.</text>
      <text x="20" y="98" font-size="11" fill="#3a3530">Stays live until admin approves removal.</text>
    </g>

    <!-- Bottom tab bar -->
    <rect x="0" y="780" width="393" height="72" fill="#fffdf7"/>
    <line x1="0" y1="780" x2="393" y2="780" stroke="#14110c" stroke-opacity="0.06"/>
    <g font-size="10" font-weight="600">
      <g transform="translate(28,792)"><circle cx="14" cy="14" r="3" fill="#3a3530"/><text x="14" y="44" text-anchor="middle" fill="#3a3530">Today</text></g>
      <g transform="translate(112,792)"><circle cx="14" cy="14" r="3" fill="#3a3530"/><text x="14" y="44" text-anchor="middle" fill="#3a3530">Orders</text></g>
      <g transform="translate(196,792)"><circle cx="14" cy="14" r="3" fill="#3a3530"/><text x="14" y="44" text-anchor="middle" fill="#3a3530">Menu</text></g>
      <g transform="translate(280,792)"><circle cx="14" cy="14" r="3" fill="#3a3530"/><text x="14" y="44" text-anchor="middle" fill="#3a3530">Payouts</text></g>
      <g transform="translate(352,792)"><circle cx="14" cy="14" r="3" fill="#0d4a2e"/><text x="14" y="44" text-anchor="middle" fill="#0d4a2e">⋯</text></g>
    </g>
    <rect x="124" y="841" width="145" height="5" rx="2.5" fill="#14110c"/>
  </g>
</svg>
