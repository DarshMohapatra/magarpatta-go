<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 393 852" width="393" height="852" font-family="Inter, system-ui, sans-serif">
  <defs><clipPath id="phone"><rect x="0" y="0" width="393" height="852" rx="56"/></clipPath></defs>
  <g clip-path="url(#phone)">
    <rect width="393" height="852" fill="#fffdf7"/>

    <!-- Status bar / island -->
    <text x="32" y="30" font-size="15" font-weight="600" fill="#14110c">9:41</text>
    <rect x="135" y="11" width="123" height="35" rx="20" fill="#14110c"/>
    <g transform="translate(320,18)"><rect x="0" y="6" width="18" height="11" rx="2" fill="none" stroke="#14110c" stroke-width="1.2"/><rect x="2" y="8" width="11" height="7" fill="#14110c"/></g>

    <!-- Header -->
    <text x="32" y="92" font-size="11" font-weight="600" fill="#e68a17" letter-spacing="2">VERIFY · MAGARPATTA ONLY</text>
    <text x="32" y="138" font-size="32" font-weight="700" fill="#14110c">Code sent to</text>
    <text x="32" y="174" font-size="32" font-weight="700" font-style="italic" fill="#0d4a2e">+91 9876543210.</text>
    <text x="32" y="208" font-size="13.5" fill="#3a3530">Enter the 6-digit code we just texted. <tspan fill="#0d4a2e" text-decoration="underline">Change number</tspan></text>

    <!-- Step indicator -->
    <g transform="translate(32,250)">
      <circle cx="11" cy="11" r="11" fill="#0d4a2e"/>
      <path d="M5 12 L9 16 L17 7" stroke="#f7efe1" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="30" y="16" font-size="11" letter-spacing="1.4" fill="#14110c">YOU</text>
      <line x1="64" y1="11" x2="100" y2="11" stroke="#0d4a2e" stroke-width="1.5" opacity="0.4"/>
      <circle cx="111" cy="11" r="11" fill="#e68a17"/>
      <text x="111" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#14110c">2</text>
      <text x="130" y="16" font-size="11" letter-spacing="1.4" fill="#14110c">VERIFY</text>
      <line x1="180" y1="11" x2="220" y2="11" stroke="#3a3530" stroke-width="1.5" opacity="0.2"/>
      <circle cx="231" cy="11" r="11" fill="#3a3530" opacity="0.15"/>
      <text x="231" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#3a3530">3</text>
      <text x="250" y="16" font-size="11" letter-spacing="1.4" fill="#3a3530" opacity="0.6">ADDRESS</text>
    </g>

    <!-- OTP boxes -->
    <g transform="translate(32,340)">
      <rect x="0"   y="0" width="48" height="60" rx="14" fill="#fffdf7" stroke="#0d4a2e" stroke-width="1.6"/>
      <text x="24" y="42" text-anchor="middle" font-size="24" font-weight="600" fill="#06311c" font-style="italic">1</text>
      <rect x="58"  y="0" width="48" height="60" rx="14" fill="#fffdf7" stroke="#0d4a2e" stroke-width="1.6"/>
      <text x="82" y="42" text-anchor="middle" font-size="24" font-weight="600" fill="#06311c" font-style="italic">2</text>
      <rect x="116" y="0" width="48" height="60" rx="14" fill="#fffdf7" stroke="#0d4a2e" stroke-width="1.6"/>
      <text x="140" y="42" text-anchor="middle" font-size="24" font-weight="600" fill="#06311c" font-style="italic">3</text>
      <rect x="174" y="0" width="48" height="60" rx="14" fill="#fffdf7" stroke="#0d4a2e" stroke-width="1.6"/>
      <text x="198" y="42" text-anchor="middle" font-size="24" font-weight="600" fill="#06311c" font-style="italic">4</text>
      <rect x="232" y="0" width="48" height="60" rx="14" fill="#fffdf7" stroke="#0d4a2e" stroke-width="1.6"/>
      <text x="256" y="42" text-anchor="middle" font-size="24" font-weight="600" fill="#06311c" font-style="italic">5</text>
      <rect x="290" y="0" width="48" height="60" rx="14" fill="#fffdf7" stroke="#0d4a2e" stroke-width="2.5"/>
      <text x="314" y="42" text-anchor="middle" font-size="24" font-weight="600" fill="#06311c" font-style="italic">6</text>
    </g>

    <!-- Resend -->
    <text x="32" y="438" font-size="13" fill="#0d4a2e" text-decoration="underline">Resend code in 19s</text>
    <text x="361" y="438" text-anchor="end" font-size="11.5" fill="#3a3530">Code expires in 5 min</text>

    <!-- CTA -->
    <g transform="translate(32,720)">
      <rect width="329" height="56" rx="20" fill="#0d4a2e"/>
      <text x="164.5" y="35" text-anchor="middle" font-size="15" font-weight="600" fill="#f7efe1">Continue   →</text>
    </g>

    <!-- Home indicator -->
    <rect x="124" y="826" width="145" height="5" rx="2.5" fill="#14110c"/>
  </g>
</svg>
