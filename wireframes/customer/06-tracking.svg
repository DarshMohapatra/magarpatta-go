<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 393 852" width="393" height="852" font-family="Inter, system-ui, sans-serif">
  <defs><clipPath id="phone"><rect x="0" y="0" width="393" height="852" rx="56"/></clipPath></defs>
  <g clip-path="url(#phone)">
    <rect width="393" height="852" fill="#fffdf7"/>

    <!-- Status bar / island -->
    <text x="32" y="30" font-size="15" font-weight="600" fill="#14110c">9:41</text>
    <rect x="135" y="11" width="123" height="35" rx="20" fill="#14110c"/>

    <!-- Map area -->
    <rect x="0" y="64" width="393" height="360" fill="#eee3ce"/>
    <g opacity="0.4" stroke="#3a3530" stroke-width="0.5" fill="none">
      <path d="M0 120 Q150 110 393 140"/>
      <path d="M0 200 Q200 220 393 200"/>
      <path d="M40 64 Q60 200 90 360"/>
      <path d="M250 64 Q220 200 240 360"/>
    </g>
    <!-- vendor pin -->
    <g transform="translate(110,150)">
      <circle r="20" fill="#0d4a2e" opacity="0.25"/>
      <circle r="10" fill="#0d4a2e"/>
      <text y="4" text-anchor="middle" font-size="11" font-weight="700" fill="#f7efe1">K</text>
    </g>
    <!-- rider pin -->
    <g transform="translate(220,260)">
      <circle r="22" fill="#e68a17" opacity="0.25"/>
      <circle r="11" fill="#e68a17"/>
      <text y="5" text-anchor="middle" font-size="13">🛵</text>
    </g>
    <!-- customer pin -->
    <g transform="translate(310,360)">
      <circle r="20" fill="#c64f2e" opacity="0.25"/>
      <circle r="10" fill="#c64f2e"/>
      <text y="4" text-anchor="middle" font-size="11" font-weight="700" fill="#f7efe1">P</text>
    </g>
    <!-- route -->
    <path d="M110 150 Q170 200 220 260 Q280 320 310 360" fill="none" stroke="#0d4a2e" stroke-width="2.5" stroke-dasharray="6 5"/>

    <!-- Back -->
    <g transform="translate(20,80)">
      <circle cx="20" cy="20" r="20" fill="#fffdf7"/>
      <path d="M22 12 L14 20 L22 28" stroke="#14110c" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Bottom sheet -->
    <g transform="translate(0,396)">
      <rect width="393" height="456" rx="32" fill="#fffdf7"/>
      <rect x="180" y="12" width="33" height="4" rx="2" fill="#14110c" opacity="0.18"/>

      <text x="32" y="50" font-size="11" letter-spacing="1.6" fill="#0d4a2e">ARRIVING IN 6 MINUTES</text>
      <text x="32" y="86" font-size="26" font-weight="700" fill="#14110c">Aman is</text>
      <text x="32" y="116" font-size="26" font-weight="700" font-style="italic" fill="#0d4a2e">on the way.</text>

      <!-- Rider card -->
      <g transform="translate(24,148)">
        <rect width="345" height="74" rx="18" fill="#f7efe1"/>
        <circle cx="42" cy="37" r="22" fill="#0d4a2e" opacity="0.18"/>
        <text x="42" y="44" text-anchor="middle" font-size="18" font-weight="700" fill="#06311c">A</text>
        <text x="80" y="33" font-size="14" font-weight="700" fill="#14110c">Aman Singh</text>
        <text x="80" y="51" font-size="11.5" fill="#3a3530">Bajaj Pulsar · MH-12 BC 4521</text>
        <g transform="translate(244,18)">
          <rect width="42" height="40" rx="12" fill="#fffdf7" stroke="#0d4a2e" stroke-width="1.4"/>
          <text x="21" y="26" text-anchor="middle" font-size="14">📞</text>
        </g>
        <g transform="translate(290,18)">
          <rect width="42" height="40" rx="12" fill="#0d4a2e"/>
          <text x="21" y="26" text-anchor="middle" font-size="14">💬</text>
        </g>
      </g>

      <!-- Status timeline -->
      <g transform="translate(32,250)">
        <circle cx="6" cy="6" r="6" fill="#0d4a2e"/>
        <line x1="6" y1="14" x2="6" y2="42" stroke="#0d4a2e" stroke-width="1.5"/>
        <text x="22" y="11" font-size="13" font-weight="600" fill="#14110c">Order placed</text>
        <text x="320" y="11" text-anchor="end" font-size="11" fill="#3a3530">9:36 AM</text>

        <circle cx="6" cy="48" r="6" fill="#0d4a2e"/>
        <line x1="6" y1="56" x2="6" y2="84" stroke="#0d4a2e" stroke-width="1.5"/>
        <text x="22" y="53" font-size="13" font-weight="600" fill="#14110c">Kalika Sweets accepted</text>
        <text x="320" y="53" text-anchor="end" font-size="11" fill="#3a3530">9:38</text>

        <circle cx="6" cy="90" r="6" fill="#0d4a2e"/>
        <line x1="6" y1="98" x2="6" y2="126" stroke="#0d4a2e" stroke-width="1.5" stroke-dasharray="3 3"/>
        <text x="22" y="95" font-size="13" font-weight="600" fill="#14110c">Aman picked up your order</text>
        <text x="320" y="95" text-anchor="end" font-size="11" fill="#3a3530">9:46</text>

        <circle cx="6" cy="132" r="6" fill="#fffdf7" stroke="#3a3530" stroke-width="1.6"/>
        <text x="22" y="137" font-size="13" fill="#3a3530">Out for delivery — ETA 9:54 AM</text>
      </g>

      <!-- Order summary -->
      <g transform="translate(24,398)">
        <rect width="345" height="46" rx="14" fill="#0d4a2e" opacity="0.06"/>
        <text x="20" y="20" font-size="11" letter-spacing="1.4" fill="#0d4a2e">ORDER #MG-22184</text>
        <text x="20" y="36" font-size="11.5" fill="#14110c">Hot Jalebi, Samosa ×2, Kaju Katli · ₹646 paid via UPI</text>
      </g>
    </g>

    <rect x="124" y="841" width="145" height="5" rx="2.5" fill="#14110c"/>
  </g>
</svg>
