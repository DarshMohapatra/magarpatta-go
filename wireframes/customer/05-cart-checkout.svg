<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 393 852" width="393" height="852" font-family="Inter, system-ui, sans-serif">
  <defs><clipPath id="phone"><rect x="0" y="0" width="393" height="852" rx="56"/></clipPath></defs>
  <g clip-path="url(#phone)">
    <rect width="393" height="852" fill="#fffdf7"/>

    <!-- Status bar / island -->
    <text x="32" y="30" font-size="15" font-weight="600" fill="#14110c">9:41</text>
    <rect x="135" y="11" width="123" height="35" rx="20" fill="#14110c"/>

    <!-- Header -->
    <g transform="translate(24,72)">
      <text font-size="11" letter-spacing="1.6" fill="#e68a17" x="0" y="0">REVIEW &amp; PAY</text>
      <text font-size="28" font-weight="700" fill="#14110c" x="0" y="34">Almost there,</text>
      <text font-size="28" font-weight="700" font-style="italic" fill="#0d4a2e" x="0" y="64">Priya.</text>
    </g>

    <!-- Items: Kalika items -->
    <g transform="translate(24,160)">
      <rect width="345" height="190" rx="18" fill="#fffdf7" stroke="#14110c" stroke-opacity="0.08"/>
      <text x="20" y="30" font-size="11" letter-spacing="1.4" fill="#3a3530">3 ITEMS · KALIKA SWEETS</text>

      <line x1="20" y1="42" x2="325" y2="42" stroke="#14110c" stroke-opacity="0.05"/>

      <text x="20" y="64" font-size="13" font-weight="600" fill="#14110c">Hot Jalebi · 200g</text>
      <text x="20" y="80" font-size="11.5" fill="#3a3530">Qty 1</text>
      <text x="305" y="64" text-anchor="end" font-size="13" font-weight="700" fill="#14110c">₹121</text>

      <line x1="20" y1="98" x2="325" y2="98" stroke="#14110c" stroke-opacity="0.05"/>
      <text x="20" y="118" font-size="13" font-weight="600" fill="#14110c">Samosa · 2 pcs</text>
      <text x="20" y="134" font-size="11.5" fill="#3a3530">Qty 2</text>
      <text x="305" y="118" text-anchor="end" font-size="13" font-weight="700" fill="#14110c">₹82</text>

      <line x1="20" y1="152" x2="325" y2="152" stroke="#14110c" stroke-opacity="0.05"/>
      <text x="20" y="172" font-size="13" font-weight="600" fill="#14110c">Kaju Katli · 200g</text>
      <text x="20" y="188" font-size="11.5" fill="#3a3530">Qty 1</text>
      <text x="305" y="172" text-anchor="end" font-size="13" font-weight="700" fill="#14110c">₹451</text>
    </g>

    <!-- Delivery address -->
    <g transform="translate(24,368)">
      <rect width="345" height="80" rx="18" fill="#fffdf7" stroke="#14110c" stroke-opacity="0.08"/>
      <text x="20" y="26" font-size="11" letter-spacing="1.4" fill="#3a3530">DELIVER TO</text>
      <text x="20" y="48" font-size="13.5" font-weight="700" fill="#14110c">Daffodils Society · Building B · 1204</text>
      <text x="20" y="66" font-size="11.5" fill="#3a3530">2nd floor · gate code 4291 · ETA 14 min</text>
      <text x="305" y="48" text-anchor="end" font-size="12" font-weight="600" fill="#0d4a2e">Change</text>
    </g>

    <!-- Coupon - real seeded coupon JALEBI -->
    <g transform="translate(24,464)">
      <rect width="345" height="48" rx="14" fill="#0d4a2e" opacity="0.06"/>
      <text x="20" y="20" font-size="11" letter-spacing="1.4" fill="#0d4a2e">COUPON CODE</text>
      <text x="20" y="38" font-size="13" font-weight="700" fill="#14110c">JALEBI</text>
      <text x="305" y="32" text-anchor="end" font-size="11.5" fill="#0d4a2e">−₹30 ✓</text>
    </g>

    <!-- Bill -->
    <g transform="translate(24,530)">
      <rect width="345" height="160" rx="18" fill="#fffdf7" stroke="#14110c" stroke-opacity="0.08"/>
      <text x="20" y="28" font-size="11" letter-spacing="1.4" fill="#3a3530">BILL DETAILS</text>
      <line x1="20" y1="40" x2="325" y2="40" stroke="#14110c" stroke-opacity="0.05"/>
      <g font-size="12.5">
        <text x="20" y="60" fill="#3a3530">Item subtotal</text>
        <text x="325" y="60" text-anchor="end" fill="#14110c">₹654</text>
        <text x="20" y="82" fill="#3a3530">Hyper-local handling fee</text>
        <text x="325" y="82" text-anchor="end" fill="#14110c">₹3</text>
        <text x="20" y="104" fill="#3a3530">Delivery (1.6 km, Magarpatta Market → Daffodils)</text>
        <text x="325" y="104" text-anchor="end" fill="#14110c">₹19</text>
        <text x="20" y="126" fill="#0d4a2e">Coupon JALEBI</text>
        <text x="325" y="126" text-anchor="end" fill="#0d4a2e">−₹30</text>
      </g>
      <line x1="20" y1="138" x2="325" y2="138" stroke="#14110c" stroke-opacity="0.08"/>
      <text x="20" y="155" font-size="14" font-weight="700" fill="#14110c">To pay</text>
      <text x="325" y="155" text-anchor="end" font-size="16" font-weight="700" fill="#0d4a2e">₹646</text>
    </g>

    <!-- Payment method -->
    <g transform="translate(24,710)">
      <rect width="345" height="56" rx="18" fill="#fffdf7" stroke="#14110c" stroke-opacity="0.08"/>
      <rect x="14" y="12" width="34" height="34" rx="10" fill="#e68a17" opacity="0.18"/>
      <text x="31" y="36" text-anchor="middle" font-size="14">U</text>
      <text x="62" y="30" font-size="13" font-weight="700" fill="#14110c">UPI · 98765…@hdfc</text>
      <text x="62" y="46" font-size="11.5" fill="#3a3530">via Razorpay · changes after tap</text>
      <text x="320" y="36" text-anchor="end" font-size="13" font-weight="600" fill="#0d4a2e">▾</text>
    </g>

    <!-- Place order -->
    <g transform="translate(24,782)">
      <rect width="345" height="50" rx="20" fill="#0d4a2e"/>
      <text x="20" y="32" font-size="14" font-weight="700" fill="#f7efe1">₹646</text>
      <text x="325" y="32" text-anchor="end" font-size="14" font-weight="600" fill="#f7efe1">Place order  →</text>
    </g>

    <rect x="124" y="841" width="145" height="5" rx="2.5" fill="#14110c"/>
  </g>
</svg>
