<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 393 852" width="393" height="852" font-family="Inter, system-ui, sans-serif">
  <defs><clipPath id="phone"><rect x="0" y="0" width="393" height="852" rx="56"/></clipPath></defs>
  <g clip-path="url(#phone)">
    <rect width="393" height="852" fill="#fffdf7"/>

    <!-- Status bar -->
    <text x="32" y="30" font-size="15" font-weight="600" fill="#14110c">9:41</text>
    <rect x="135" y="11" width="123" height="35" rx="20" fill="#14110c"/>

    <!-- Map -->
    <rect x="0" y="64" width="393" height="340" fill="#eee3ce"/>
    <g opacity="0.4" stroke="#3a3530" stroke-width="0.5" fill="none">
      <path d="M0 130 Q150 120 393 150"/>
      <path d="M0 220 Q200 240 393 220"/>
      <path d="M50 64 Q70 200 100 404"/>
      <path d="M260 64 Q230 200 250 404"/>
    </g>

    <!-- vendor pin -->
    <g transform="translate(196,260)">
      <circle r="26" fill="#e68a17" opacity="0.25"/>
      <circle r="14" fill="#e68a17"/>
      <text y="5" text-anchor="middle" font-size="14" font-weight="700" fill="#14110c">K</text>
    </g>
    <!-- rider pin -->
    <g transform="translate(80,360)">
      <circle r="22" fill="#0d4a2e" opacity="0.25"/>
      <circle r="11" fill="#0d4a2e"/>
      <text y="5" text-anchor="middle" font-size="13">🛵</text>
    </g>
    <!-- route -->
    <path d="M80 360 Q140 320 196 260" fill="none" stroke="#0d4a2e" stroke-width="2.5" stroke-dasharray="6 5"/>

    <!-- Back -->
    <g transform="translate(20,80)">
      <circle cx="20" cy="20" r="20" fill="#fffdf7"/>
      <path d="M22 12 L14 20 L22 28" stroke="#14110c" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    </g>

    <!-- ETA pill -->
    <g transform="translate(120,84)">
      <rect width="152" height="38" rx="19" fill="#0d4a2e"/>
      <circle cx="22" cy="19" r="5" fill="#f4b564"/>
      <text x="38" y="24" font-size="13" font-weight="700" fill="#f7efe1">PICKUP IN 4 MIN</text>
    </g>

    <!-- Bottom sheet -->
    <g transform="translate(0,376)">
      <rect width="393" height="476" rx="32" fill="#fffdf7"/>
      <rect x="180" y="12" width="33" height="4" rx="2" fill="#14110c" opacity="0.18"/>

      <text x="32" y="50" font-size="11" letter-spacing="1.6" fill="#e68a17">PICK UP FROM</text>
      <text x="32" y="86" font-size="26" font-weight="700" fill="#14110c">Kalika Sweets</text>
      <text x="32" y="106" font-size="13" fill="#3a3530">Magarpatta Market · Stall 14 · 0.6 km · 4 min</text>

      <!-- Vendor contact -->
      <g transform="translate(24,128)">
        <rect width="345" height="64" rx="16" fill="#f7efe1"/>
        <circle cx="32" cy="32" r="20" fill="#e68a17" opacity="0.22"/>
        <text x="32" y="38" text-anchor="middle" font-size="16">🍮</text>
        <text x="64" y="28" font-size="13" font-weight="700" fill="#14110c">Suresh (owner)</text>
        <text x="64" y="46" font-size="11.5" fill="#3a3530">Order #MG-22184 · ready in 2 min</text>
        <g transform="translate(286,12)">
          <rect width="42" height="40" rx="12" fill="#fffdf7" stroke="#0d4a2e" stroke-width="1.4"/>
          <text x="21" y="26" text-anchor="middle" font-size="14">📞</text>
        </g>
      </g>

      <!-- Order items -->
      <g transform="translate(24,212)">
        <rect width="345" height="146" rx="16" fill="#fffdf7" stroke="#14110c" stroke-opacity="0.08"/>
        <text x="20" y="28" font-size="11" letter-spacing="1.4" fill="#3a3530">3 ITEMS · CONFIRM AT COUNTER</text>
        <line x1="20" y1="40" x2="325" y2="40" stroke="#14110c" stroke-opacity="0.05"/>

        <text x="20" y="62" font-size="13" font-weight="600" fill="#14110c">1×  Hot Jalebi</text>
        <text x="305" y="62" text-anchor="end" font-size="11" fill="#3a3530">200g</text>

        <text x="20" y="86" font-size="13" font-weight="600" fill="#14110c">2×  Samosa</text>
        <text x="305" y="86" text-anchor="end" font-size="11" fill="#3a3530">2 pcs each</text>

        <text x="20" y="110" font-size="13" font-weight="600" fill="#14110c">1×  Kaju Katli</text>
        <text x="305" y="110" text-anchor="end" font-size="11" fill="#3a3530">200g</text>

        <line x1="20" y1="120" x2="325" y2="120" stroke="#14110c" stroke-opacity="0.05"/>
        <text x="20" y="138" font-size="11" fill="#0d4a2e">Customer paid ₹646 · prepaid (UPI)</text>
      </g>

      <!-- Mark picked up -->
      <g transform="translate(24,378)">
        <rect width="345" height="58" rx="20" fill="#0d4a2e"/>
        <text x="172.5" y="36" text-anchor="middle" font-size="15" font-weight="600" fill="#f7efe1">Mark picked up   →</text>
      </g>
    </g>

    <rect x="124" y="841" width="145" height="5" rx="2.5" fill="#14110c"/>
  </g>
</svg>
