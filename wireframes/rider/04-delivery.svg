<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 393 852" width="393" height="852" font-family="Inter, system-ui, sans-serif">
  <defs><clipPath id="phone"><rect x="0" y="0" width="393" height="852" rx="56"/></clipPath></defs>
  <g clip-path="url(#phone)">
    <rect width="393" height="852" fill="#fffdf7"/>

    <!-- Status bar -->
    <text x="32" y="30" font-size="15" font-weight="600" fill="#14110c">9:41</text>
    <rect x="135" y="11" width="123" height="35" rx="20" fill="#14110c"/>

    <!-- Map -->
    <rect x="0" y="64" width="393" height="380" fill="#eee3ce"/>
    <g opacity="0.4" stroke="#3a3530" stroke-width="0.5" fill="none">
      <path d="M0 130 Q150 120 393 150"/>
      <path d="M0 240 Q200 260 393 240"/>
      <path d="M50 64 Q70 200 100 444"/>
      <path d="M260 64 Q230 200 250 444"/>
    </g>

    <!-- Big arrow guide -->
    <g transform="translate(196,154)">
      <circle r="32" fill="#0d4a2e"/>
      <path d="M-10 6 L0 -10 L10 6 L4 6 L4 14 L-4 14 L-4 6 Z" fill="#f7efe1"/>
    </g>

    <!-- vendor pin (origin, dim) -->
    <g transform="translate(80,140)">
      <circle r="14" fill="#3a3530" opacity="0.25"/>
      <circle r="7" fill="#3a3530" opacity="0.6"/>
    </g>
    <!-- rider current pin -->
    <g transform="translate(220,250)">
      <circle r="22" fill="#0d4a2e" opacity="0.25"/>
      <circle r="11" fill="#0d4a2e"/>
      <text y="5" text-anchor="middle" font-size="13">🛵</text>
    </g>
    <!-- destination pin -->
    <g transform="translate(310,400)">
      <circle r="20" fill="#c64f2e" opacity="0.25"/>
      <circle r="10" fill="#c64f2e"/>
      <text y="4" text-anchor="middle" font-size="11" font-weight="700" fill="#f7efe1">P</text>
    </g>
    <!-- route -->
    <path d="M80 140 Q150 200 220 250 Q280 320 310 400" fill="none" stroke="#0d4a2e" stroke-width="2.5" stroke-dasharray="6 5"/>

    <!-- Back -->
    <g transform="translate(20,80)">
      <circle cx="20" cy="20" r="20" fill="#fffdf7"/>
      <path d="M22 12 L14 20 L22 28" stroke="#14110c" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Direction strip -->
    <g transform="translate(64,200)">
      <rect width="266" height="60" rx="16" fill="#fffdf7"/>
      <circle cx="32" cy="30" r="18" fill="#0d4a2e"/>
      <path d="M28 36 L40 24 M40 24 L40 32 M40 24 L32 24" stroke="#f7efe1" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="60" y="28" font-size="14" font-weight="700" fill="#14110c">Take 2nd right</text>
      <text x="60" y="46" font-size="11.5" fill="#3a3530">in 200 m · onto Daffodils Lane</text>
    </g>

    <!-- Bottom sheet -->
    <g transform="translate(0,416)">
      <rect width="393" height="436" rx="32" fill="#fffdf7"/>
      <rect x="180" y="12" width="33" height="4" rx="2" fill="#14110c" opacity="0.18"/>

      <text x="32" y="50" font-size="11" letter-spacing="1.6" fill="#0d4a2e">DROP IN 6 MINUTES</text>
      <text x="32" y="86" font-size="26" font-weight="700" fill="#14110c">Daffodils B-1204</text>
      <text x="32" y="106" font-size="13" fill="#3a3530">Priya · 2nd floor · gate code 4291</text>

      <!-- Customer card -->
      <g transform="translate(24,128)">
        <rect width="345" height="74" rx="16" fill="#f7efe1"/>
        <circle cx="42" cy="37" r="22" fill="#0d4a2e" opacity="0.18"/>
        <text x="42" y="44" text-anchor="middle" font-size="18" font-weight="700" fill="#06311c">P</text>
        <text x="80" y="33" font-size="14" font-weight="700" fill="#14110c">Priya Rao</text>
        <text x="80" y="51" font-size="11.5" fill="#3a3530">Daffodils Society · Tower B</text>
        <g transform="translate(244,18)">
          <rect width="42" height="40" rx="12" fill="#fffdf7" stroke="#0d4a2e" stroke-width="1.4"/>
          <text x="21" y="26" text-anchor="middle" font-size="14">📞</text>
        </g>
        <g transform="translate(290,18)">
          <rect width="42" height="40" rx="12" fill="#0d4a2e"/>
          <text x="21" y="26" text-anchor="middle" font-size="14">💬</text>
        </g>
      </g>

      <!-- Order summary -->
      <g transform="translate(24,222)">
        <rect width="345" height="78" rx="16" fill="#fffdf7" stroke="#14110c" stroke-opacity="0.08"/>
        <text x="20" y="26" font-size="11" letter-spacing="1.4" fill="#3a3530">CARRYING</text>
        <text x="20" y="46" font-size="13" font-weight="600" fill="#14110c">Hot Jalebi · Samosa ×2 · Kaju Katli</text>
        <text x="20" y="66" font-size="11.5" fill="#0d4a2e">Prepaid · no cash to collect · payout ₹62</text>
      </g>

      <!-- Mark delivered -->
      <g transform="translate(24,326)">
        <rect width="345" height="58" rx="20" fill="#0d4a2e"/>
        <text x="172.5" y="36" text-anchor="middle" font-size="15" font-weight="600" fill="#f7efe1">Mark delivered   →</text>
      </g>

      <text x="196.5" y="406" text-anchor="middle" font-size="11.5" fill="#3a3530">Customer will get an OTP to confirm handover.</text>
    </g>

    <rect x="124" y="841" width="145" height="5" rx="2.5" fill="#14110c"/>
  </g>
</svg>
