<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 393 852" width="393" height="852" font-family="Inter, system-ui, sans-serif">
  <defs><clipPath id="phone"><rect x="0" y="0" width="393" height="852" rx="56"/></clipPath></defs>
  <g clip-path="url(#phone)">
    <rect width="393" height="852" fill="#fffdf7"/>

    <!-- Status bar / island -->
    <text x="32" y="30" font-size="15" font-weight="600" fill="#14110c">9:41</text>
    <rect x="135" y="11" width="123" height="35" rx="20" fill="#14110c"/>

    <!-- Brand -->
    <g transform="translate(32,84)">
      <circle cx="20" cy="20" r="20" fill="#e68a17"/>
      <text x="20" y="27" text-anchor="middle" font-size="18">🛵</text>
      <text x="50" y="18" font-size="11" letter-spacing="1.6" fill="#0d4a2e">RIDER</text>
      <text x="50" y="34" font-size="13" font-weight="700" fill="#14110c">Magarpatta Go</text>
    </g>

    <!-- Header -->
    <g transform="translate(32,170)">
      <text font-size="32" font-weight="700" fill="#14110c">Ride only inside</text>
      <text font-size="32" font-weight="700" font-style="italic" fill="#0d4a2e" y="36">the township.</text>
    </g>

    <text x="32" y="266" font-size="13.5" fill="#3a3530">Short trips, fair pay, payouts every evening. Magarpatta City only — no bridge crossings.</text>

    <!-- Phone field -->
    <g transform="translate(32,328)">
      <rect width="329" height="76" rx="20" fill="#fffdf7" stroke="#0d4a2e" stroke-width="1.6"/>
      <text x="20" y="26" font-size="11" letter-spacing="1.6" fill="#3a3530">YOUR MOBILE</text>
      <text x="20" y="58" font-size="20" fill="#3a3530">+91</text>
      <text x="60" y="58" font-size="20" font-weight="600" fill="#14110c">88888 88801</text>
      <circle cx="306" cy="48" r="12" fill="#0d4a2e"/>
      <path d="M301 48 L305 52 L313 44" stroke="#f7efe1" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>

    <!-- CTA -->
    <g transform="translate(32,432)">
      <rect width="329" height="56" rx="20" fill="#0d4a2e"/>
      <text x="164.5" y="35" text-anchor="middle" font-size="15" font-weight="600" fill="#f7efe1">Send OTP   →</text>
    </g>

    <text x="196.5" y="522" text-anchor="middle" font-size="12.5" fill="#3a3530">Want to ride for us? <tspan font-weight="600" fill="#0d4a2e">Apply with DL + Aadhaar</tspan></text>

    <!-- Why card -->
    <g transform="translate(24,640)">
      <rect width="345" height="120" rx="20" fill="#f7efe1"/>
      <text x="20" y="32" font-size="11" letter-spacing="1.6" fill="#e68a17">WHY MAGARPATTA GO</text>
      <text x="20" y="58" font-size="13" fill="#14110c">· All trips inside Magarpatta City — never further.</text>
      <text x="20" y="80" font-size="13" fill="#14110c">· Per-order base + distance + tip, paid daily.</text>
      <text x="20" y="102" font-size="13" fill="#14110c">· Toggle on-duty when you&apos;re ready, off when not.</text>
    </g>

    <rect x="124" y="826" width="145" height="5" rx="2.5" fill="#14110c"/>
  </g>
</svg>
