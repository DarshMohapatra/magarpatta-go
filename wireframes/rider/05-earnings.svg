<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 393 852" width="393" height="852" font-family="Inter, system-ui, sans-serif">
  <defs><clipPath id="phone"><rect x="0" y="0" width="393" height="852" rx="56"/></clipPath></defs>
  <g clip-path="url(#phone)">
    <rect width="393" height="852" fill="#fffdf7"/>

    <!-- Status bar -->
    <text x="32" y="30" font-size="15" font-weight="600" fill="#14110c">9:41</text>
    <rect x="135" y="11" width="123" height="35" rx="20" fill="#14110c"/>

    <!-- Header -->
    <g transform="translate(24,72)">
      <text font-size="11" letter-spacing="1.6" fill="#e68a17">EARNINGS</text>
      <text font-size="28" font-weight="700" fill="#14110c" y="36">This week,</text>
      <text font-size="28" font-weight="700" font-style="italic" fill="#0d4a2e" y="68">Aman.</text>
    </g>

    <!-- Hero stat -->
    <g transform="translate(24,196)">
      <rect width="345" height="124" rx="20" fill="#0d4a2e"/>
      <text x="20" y="28" font-size="11" letter-spacing="1.6" fill="#f4b564">EARNED MON–SUN</text>
      <text x="20" y="80" font-size="48" font-weight="700" fill="#f7efe1">₹2,840</text>
      <text x="20" y="108" font-size="12" fill="#eee3ce">42 trips · 64 km · ₹68 avg per trip</text>
    </g>

    <!-- Next payout -->
    <g transform="translate(24,344)">
      <rect width="345" height="74" rx="18" fill="#fffdf7" stroke="#e68a17" stroke-width="1.4"/>
      <text x="20" y="26" font-size="11" letter-spacing="1.4" fill="#e68a17">NEXT PAYOUT</text>
      <text x="20" y="50" font-size="20" font-weight="700" fill="#14110c">₹420 today, 9 PM</text>
      <text x="20" y="66" font-size="11.5" fill="#3a3530">to HDFC ****4218 · daily transfer · IMPS</text>
    </g>

    <!-- Daily breakdown -->
    <text x="24" y="448" font-size="11" letter-spacing="1.6" fill="#3a3530">DAILY BREAKDOWN</text>

    <g transform="translate(24,468)" font-size="12.5">
      <rect width="345" height="216" rx="18" fill="#fffdf7" stroke="#14110c" stroke-opacity="0.08"/>

      <g transform="translate(20,18)">
        <text font-weight="600" fill="#14110c">Today (Sun)</text>
        <text x="180" font-size="10.5" fill="#3a3530">7 trips · 14 km</text>
        <text x="305" font-weight="700" text-anchor="end" fill="#0d4a2e">₹420</text>
      </g>
      <line x1="20" y1="36" x2="325" y2="36" stroke="#14110c" stroke-opacity="0.05"/>

      <g transform="translate(20,52)">
        <text font-weight="600" fill="#14110c">Sat</text>
        <text x="180" font-size="10.5" fill="#3a3530">9 trips · 16 km</text>
        <text x="305" font-weight="700" text-anchor="end" fill="#14110c">₹540</text>
      </g>
      <line x1="20" y1="70" x2="325" y2="70" stroke="#14110c" stroke-opacity="0.05"/>

      <g transform="translate(20,86)">
        <text font-weight="600" fill="#14110c">Fri</text>
        <text x="180" font-size="10.5" fill="#3a3530">8 trips · 12 km</text>
        <text x="305" font-weight="700" text-anchor="end" fill="#14110c">₹480</text>
      </g>
      <line x1="20" y1="104" x2="325" y2="104" stroke="#14110c" stroke-opacity="0.05"/>

      <g transform="translate(20,120)">
        <text font-weight="600" fill="#14110c">Thu</text>
        <text x="180" font-size="10.5" fill="#3a3530">5 trips · 9 km</text>
        <text x="305" font-weight="700" text-anchor="end" fill="#14110c">₹310</text>
      </g>
      <line x1="20" y1="138" x2="325" y2="138" stroke="#14110c" stroke-opacity="0.05"/>

      <g transform="translate(20,154)">
        <text font-weight="600" fill="#14110c">Wed</text>
        <text x="180" font-size="10.5" fill="#3a3530">6 trips · 8 km</text>
        <text x="305" font-weight="700" text-anchor="end" fill="#14110c">₹360</text>
      </g>
      <line x1="20" y1="172" x2="325" y2="172" stroke="#14110c" stroke-opacity="0.05"/>

      <g transform="translate(20,188)">
        <text font-weight="600" fill="#14110c">Mon + Tue</text>
        <text x="180" font-size="10.5" fill="#3a3530">7 trips · 5 km</text>
        <text x="305" font-weight="700" text-anchor="end" fill="#14110c">₹730</text>
      </g>
    </g>

    <!-- Bottom tab bar -->
    <rect x="0" y="780" width="393" height="72" fill="#fffdf7"/>
    <line x1="0" y1="780" x2="393" y2="780" stroke="#14110c" stroke-opacity="0.06"/>
    <g font-size="10" font-weight="600">
      <g transform="translate(58,792)"><circle cx="14" cy="14" r="3" fill="#3a3530"/><text x="14" y="44" text-anchor="middle" fill="#3a3530">Home</text></g>
      <g transform="translate(174,792)"><circle cx="14" cy="14" r="3" fill="#0d4a2e"/><text x="14" y="44" text-anchor="middle" fill="#0d4a2e">Earnings</text></g>
      <g transform="translate(290,792)"><circle cx="14" cy="14" r="3" fill="#3a3530"/><text x="14" y="44" text-anchor="middle" fill="#3a3530">You</text></g>
    </g>
    <rect x="124" y="841" width="145" height="5" rx="2.5" fill="#14110c"/>
  </g>
</svg>
