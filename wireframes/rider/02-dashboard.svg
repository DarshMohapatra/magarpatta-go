<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 393 852" width="393" height="852" font-family="Inter, system-ui, sans-serif">
  <defs><clipPath id="phone"><rect x="0" y="0" width="393" height="852" rx="56"/></clipPath></defs>
  <g clip-path="url(#phone)">
    <rect width="393" height="852" fill="#fffdf7"/>

    <!-- Status bar -->
    <text x="32" y="30" font-size="15" font-weight="600" fill="#14110c">9:41</text>
    <rect x="135" y="11" width="123" height="35" rx="20" fill="#14110c"/>

    <!-- Header -->
    <g transform="translate(24,72)">
      <text font-size="11" letter-spacing="1.6" fill="#e68a17">RIDER · MAGARPATTA</text>
      <text font-size="14" font-weight="600" fill="#14110c" y="20">Aman Singh · Bajaj Pulsar</text>
    </g>

    <!-- On-duty toggle card -->
    <g transform="translate(24,124)">
      <rect width="345" height="100" rx="20" fill="#0d4a2e"/>
      <text x="20" y="30" font-size="11" letter-spacing="1.6" fill="#f4b564">YOU&apos;RE</text>
      <text x="20" y="64" font-size="28" font-weight="700" fill="#f7efe1">On duty</text>
      <text x="20" y="86" font-size="12" fill="#eee3ce">since 8:14 AM · 1h 27m</text>
      <g transform="translate(266,30)">
        <rect width="64" height="40" rx="20" fill="#f7efe1"/>
        <circle cx="44" cy="20" r="16" fill="#0d4a2e"/>
      </g>
    </g>

    <!-- Today stats -->
    <g transform="translate(24,248)">
      <rect width="111" height="80" rx="16" fill="#fffdf7" stroke="#14110c" stroke-opacity="0.08"/>
      <text x="14" y="24" font-size="10.5" letter-spacing="1.4" fill="#3a3530">DELIVERED</text>
      <text x="14" y="58" font-size="26" font-weight="700" fill="#14110c">7</text>
      <g transform="translate(117,0)">
        <rect width="111" height="80" rx="16" fill="#fffdf7" stroke="#14110c" stroke-opacity="0.08"/>
        <text x="14" y="24" font-size="10.5" letter-spacing="1.4" fill="#3a3530">EARNED</text>
        <text x="14" y="58" font-size="26" font-weight="700" fill="#0d4a2e">₹420</text>
      </g>
      <g transform="translate(234,0)">
        <rect width="111" height="80" rx="16" fill="#fffdf7" stroke="#14110c" stroke-opacity="0.08"/>
        <text x="14" y="24" font-size="10.5" letter-spacing="1.4" fill="#3a3530">DISTANCE</text>
        <text x="14" y="58" font-size="26" font-weight="700" fill="#14110c">14 km</text>
      </g>
    </g>

    <!-- Available pickup -->
    <text x="24" y="362" font-size="11" letter-spacing="1.6" fill="#3a3530">NEW PICKUP NEAR YOU</text>

    <g transform="translate(24,382)">
      <rect width="345" height="206" rx="18" fill="#fffdf7" stroke="#e68a17" stroke-width="1.5"/>

      <!-- Vendor -->
      <g transform="translate(20,18)">
        <circle cx="14" cy="14" r="14" fill="#e68a17" opacity="0.18"/>
        <text x="14" y="20" text-anchor="middle" font-size="14">🍮</text>
        <text x="38" y="14" font-size="13" font-weight="700" fill="#14110c">Kalika Sweets</text>
        <text x="38" y="28" font-size="10.5" fill="#3a3530">Magarpatta Market</text>
      </g>

      <!-- Arrow -->
      <text x="180" y="44" font-size="14" fill="#3a3530">→</text>

      <!-- Customer -->
      <g transform="translate(206,18)">
        <circle cx="14" cy="14" r="14" fill="#0d4a2e" opacity="0.18"/>
        <text x="14" y="19" text-anchor="middle" font-size="11" font-weight="700" fill="#06311c">P</text>
        <text x="38" y="14" font-size="13" font-weight="700" fill="#14110c">Daffodils B-1204</text>
        <text x="38" y="28" font-size="10.5" fill="#3a3530">Priya · 2nd floor</text>
      </g>

      <line x1="20" y1="58" x2="325" y2="58" stroke="#14110c" stroke-opacity="0.06"/>

      <!-- Stats -->
      <g transform="translate(20,72)" font-size="10.5" letter-spacing="1.4" fill="#3a3530">
        <text x="0" y="0">DISTANCE</text>
        <text x="0" y="22" font-size="16" font-weight="700" fill="#14110c">1.6 km</text>

        <text x="120" y="0">PAYOUT</text>
        <text x="120" y="22" font-size="16" font-weight="700" fill="#0d4a2e">₹62</text>

        <text x="220" y="0">ETA</text>
        <text x="220" y="22" font-size="16" font-weight="700" fill="#14110c">12 min</text>
      </g>

      <text x="20" y="146" font-size="11.5" fill="#3a3530">3 items · ₹243 · prepaid</text>

      <!-- Actions -->
      <g transform="translate(20,160)">
        <rect width="218" height="36" rx="14" fill="#0d4a2e"/>
        <text x="109" y="23" text-anchor="middle" font-size="13" font-weight="600" fill="#f7efe1">Accept · in 22s</text>
      </g>
      <g transform="translate(246,160)">
        <rect width="80" height="36" rx="14" fill="#fffdf7" stroke="#c64f2e" stroke-width="1.4"/>
        <text x="40" y="23" text-anchor="middle" font-size="12" font-weight="600" fill="#c64f2e">Skip</text>
      </g>
    </g>

    <!-- Recent -->
    <text x="24" y="624" font-size="11" letter-spacing="1.6" fill="#3a3530">RECENT TRIPS</text>
    <g transform="translate(24,644)">
      <rect width="345" height="48" rx="14" fill="#fffdf7" stroke="#14110c" stroke-opacity="0.08"/>
      <text x="20" y="20" font-size="12" font-weight="600" fill="#14110c">Destination Centre → Sunflower D-302</text>
      <text x="20" y="36" font-size="10.5" fill="#3a3530">9:24 AM · 1.2 km · ₹54 · ★ 5</text>
    </g>
    <g transform="translate(24,704)">
      <rect width="345" height="48" rx="14" fill="#fffdf7" stroke="#14110c" stroke-opacity="0.08"/>
      <text x="20" y="20" font-size="12" font-weight="600" fill="#14110c">Magarpatta Pharmacy → Iris C-810</text>
      <text x="20" y="36" font-size="10.5" fill="#3a3530">8:52 AM · 0.9 km · ₹48 · ★ 5</text>
    </g>

    <!-- Bottom tab bar -->
    <rect x="0" y="780" width="393" height="72" fill="#fffdf7"/>
    <line x1="0" y1="780" x2="393" y2="780" stroke="#14110c" stroke-opacity="0.06"/>
    <g font-size="10" font-weight="600">
      <g transform="translate(58,792)"><circle cx="14" cy="14" r="3" fill="#0d4a2e"/><text x="14" y="44" text-anchor="middle" fill="#0d4a2e">Home</text></g>
      <g transform="translate(174,792)"><circle cx="14" cy="14" r="3" fill="#3a3530"/><text x="14" y="44" text-anchor="middle" fill="#3a3530">Earnings</text></g>
      <g transform="translate(290,792)"><circle cx="14" cy="14" r="3" fill="#3a3530"/><text x="14" y="44" text-anchor="middle" fill="#3a3530">You</text></g>
    </g>
    <rect x="124" y="841" width="145" height="5" rx="2.5" fill="#14110c"/>
  </g>
</svg>
